      <stop stop-color="#7CFFB2"/>
      <stop offset="1" stop-color="#18B85B"/>
    </linearGradient>
    <filter id="soft-shadow" x="10" y="12" width="44" height="44" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect x="1.5" y="1.5" width="61" height="61" rx="18" fill="url(#mark-bg)"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="18" fill="url(#mark-glow)"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="18" fill="none" stroke="#2C343D"/>
  <g filter="url(#soft-shadow)">
    <path d="M17.5 18.8c5.8-.95 10.68.24 14.5 3.58v25.18c-3.82-3.34-8.7-4.54-14.5-3.58V18.8Z" fill="url(#page-left)"/>
    <path d="M46.5 18.8c-5.8-.95-10.68.24-14.5 3.58v25.18c3.82-3.34 8.7-4.54 14.5-3.58V18.8Z" fill="url(#page-right)"/>
    <path d="M32 22.28v25.1" stroke="#392A00" stroke-linecap="round" stroke-opacity="0.45" stroke-width="1.4"/>
