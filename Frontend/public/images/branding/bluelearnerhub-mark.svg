<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">BlueLearnerHub mark</title>
  <desc id="desc">A premium learning hub mark with open pages, code brackets, and connected progress.</desc>
  <defs>
    <linearGradient id="mark-bg" x1="8" y1="6" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#202226"/>
      <stop offset="0.45" stop-color="#111418"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <radialGradient id="mark-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(47 14) rotate(128) scale(47 38)">
      <stop stop-color="#FFD300" stop-opacity="0.3"/>
      <stop offset="0.5" stop-color="#66C4FF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#050607" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="page-left" x1="18" y1="19" x2="33" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF4A8"/>
      <stop offset="0.42" stop-color="#FFD300"/>
      <stop offset="1" stop-color="#E0AE00"/>
    </linearGradient>
    <linearGradient id="page-right" x1="46" y1="19" x2="30" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE978"/>
      <stop offset="0.5" stop-color="#FFD300"/>
      <stop offset="1" stop-color="#B98700"/>
    </linearGradient>
    <linearGradient id="code-blue" x1="21" y1="34" x2="43" y2="38" gradientUnits="userSpaceOnUse">
