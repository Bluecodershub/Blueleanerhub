    <circle cx="32" cy="36.5" r="4.1" fill="url(#progress-green)" stroke="#0B1510" stroke-width="1.1"/>
    <path d="m30.15 36.45 1.3 1.3 2.55-2.85" fill="none" stroke="#072112" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6"/>
