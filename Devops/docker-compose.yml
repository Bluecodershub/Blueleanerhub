version: '3.8'

# =============================================================================
# DEVELOPMENT ONLY - DO NOT USE IN PRODUCTION
# These default values are for local development convenience only.
# Override all secrets via environment variables in production deployments.
# =============================================================================
#
# BEFORE RUNNING: Copy .env.example to .env and generate secure secrets:
#   cp .env.example .env
#   openssl rand -hex 32  # Run this for each secret below
# =============================================================================

services:
  mongodb:
    image: mongo:7-jammy
    container_name: edtech_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_ROOT_USER:?MONGO_ROOT_USER is required}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required. Generate with openssl rand -hex 32}"
      MONGO_INITDB_DATABASE: bluelearnerhub
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edtech-network

  redis:
    image: redis:7-alpine
    container_name: edtech_redis
    command: redis-server --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD is required. Generate with openssl rand -hex 32}"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edtech-network

  backend:
    build:
      context: ../Backend
      dockerfile: Dockerfile
    container_name: edtech_backend
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=5000
      - HOST=0.0.0.0

      # MongoDB Configuration (Primary Database)
      - MONGODB_URL=mongodb://${MONGO_ROOT_USER:?MONGO_ROOT_USER is required}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@mongodb:27017/bluelearnerhub?authSource=admin
      - DB_HOST=mongodb
      - DB_PORT=27017
      - DB_NAME=bluelearnerhub

      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required. Generate with openssl rand -hex 32}
      - REDIS_DB=0

      # Security — REQUIRED even in development (generate once, reuse locally)
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required. Generate with openssl rand -hex 64}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required. Generate with openssl rand -hex 64}
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_EXPIRES_IN=30d
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required. Generate with openssl rand -hex 64}
      - COOKIE_SECRET=${COOKIE_SECRET:?COOKIE_SECRET is required. Generate with openssl rand -hex 64}

      # External Services
      - AI_SERVICE_URL=http://ai-services:8000
      - FRONTEND_URL=http://frontend:3000
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
      # Shared secret for backend→AI-worker internal calls
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET is required. Generate with openssl rand -hex 32}

      # Optional Services
      - JUDGE0_API_KEY=${JUDGE0_API_KEY}
      - JUDGE0_API_URL=${JUDGE0_API_URL:-https://judge0-ce.p.rapidapi.com}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}

    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../Backend/src:/app/src
      - ../Backend/uploads:/app/uploads
    networks:
      - edtech-network
    restart: unless-stopped

  ai-services:
    build:
      context: ../Worker/ai-services
      dockerfile: Dockerfile
    container_name: edtech_ai_services
    environment:
      # AI API Keys
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Shared secret (must match backend INTERNAL_SERVICE_SECRET)
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET is required. Generate with openssl rand -hex 32}

      # Local LLM (Ollama) Configuration - Optional fallback
      - OLLAMA_URL=${OLLAMA_URL:-}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-llama3}

      # Service Configuration
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=8000
      - HOST=0.0.0.0

      # CORS - Allow backend and frontend
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5000,http://backend:5000,http://frontend:3000

    ports:
      - "8000:8000"
    volumes:
      - ../Worker/ai-services:/app
      - ../Worker/ai-services/logs:/app/logs
    networks:
      - edtech-network
    restart: unless-stopped
    command: npm start
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          memory: 512M

  frontend:
    build:
      context: ../Frontend
      dockerfile: Dockerfile
      args:
        - BUILD_STANDALONE=true
    container_name: edtech_frontend
    environment:
      # API Configuration
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_WS_URL=ws://localhost:5000
      - NEXT_PUBLIC_AI_SERVICE_URL=http://localhost:8000
      
      # Application Configuration
      - NEXT_PUBLIC_APP_NAME=BluelearnerHub
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      
      # Authentication
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your-nextauth-secret-change-in-production}
      
      # OAuth (Optional)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      
      # Feature Flags
      - NEXT_PUBLIC_ENABLE_AI_COMPANION=${ENABLE_AI_COMPANION:-true}
      - NEXT_PUBLIC_ENABLE_ANALYTICS=${ENABLE_ANALYTICS:-false}
      
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - edtech-network
    restart: unless-stopped

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: edtech_nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
      - ai-services
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - edtech-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  edtech-network:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_NETWORK_SUBNET:-172.20.0.0/16}
