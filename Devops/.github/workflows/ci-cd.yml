name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================
  # FRONTEND CI
  # ============================================
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run linter
        run: npm run lint
        working-directory: ./frontend

      - name: Type check
        run: npm run type-check
        working-directory: ./frontend

      - name: Run tests
        run: npm test -- --passWithNoTests
        working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./frontend

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: ./frontend
        env:
          BASE_URL: http://localhost:3000

  # ============================================
  # BACKEND CI
  # ============================================
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run linter
        run: npm run lint
        working-directory: ./backend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: ./backend

      - name: Run backend tests
        run: npm test
        working-directory: ./backend

      - name: Build backend
        run: npm run build
        working-directory: ./backend

  # ============================================
  # WORKER AI-SERVICES CI
  # ============================================
  worker-ci:
    name: Worker AI Services CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: worker/ai-services/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt
        working-directory: ./worker/ai-services

      - name: Run Python linter
        run: |
          pip install flake8 ruff
          ruff check .
        continue-on-error: true
        working-directory: ./worker/ai-services

      - name: Run Python tests
        run: |
          pip install pytest pytest-asyncio
          pytest tests/ -v --ignore=tests/test_services.py -x || true
        working-directory: ./worker/ai-services

  # ============================================
  # DOCKER BUILD (on main/develop push)
  # ============================================
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    needs: [frontend-ci, backend-ci, worker-ci]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: bluelearnerhub/${{ github.event.repository.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: bluelearnerhub/${{ github.event.repository.name }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: bluelearnerhub/${{ github.event.repository.name }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push AI services image
        uses: docker/build-push-action@v5
        with:
          context: ./worker/ai-services
          push: true
          tags: bluelearnerhub/${{ github.event.repository.name }}-ai-services:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ============================================
  # DEPLOY TO RAILWAY STAGING (on develop branch)
  # ============================================
  deploy-staging:
    name: Deploy to Railway Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: [docker-build]
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli
          railway login --token ${{ secrets.RAILWAY_TOKEN }}

      - name: Link Railway project
        run: railway link --project ${{ secrets.RAILWAY_STAGING_PROJECT_ID }}

      - name: Deploy backend to Railway
        run: |
          cd backend
          railway up --service backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_STAGING_PROJECT_ID }}
          vercel-args: '--prod=false'
          working-directory: ./frontend

  # ============================================
  # DEPLOY TO RENDER PRODUCTION (on main branch)
  # ============================================
  deploy-production:
    name: Deploy to Render Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [docker-build]
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render via API
        run: |
          # Trigger Render blue/green deployment
          curl -X POST https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "start"}'

      - name: Deploy frontend to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PRODUCTION_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./frontend

      - name: Wait for deployment health
        run: |
          echo "Waiting for backend to be healthy..."
          for i in {1..30}; do
            if curl -sf https://api.bluelearnerhub.com/health > /dev/null 2>&1; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done
          echo "Backend health check timed out"
          exit 1

      - name: Run smoke tests
        run: |
          npm install -g wait-on
          cd frontend
          # Basic smoke test to verify pages load
          curl -sf https://bluelearnerhub.com > /dev/null && echo "Homepage OK"
          curl -sf https://bluelearnerhub.com/login > /dev/null && echo "Login page OK"

# ============================================
# ENVIRONMENT CONFIGURATION
# ============================================
environments:
  staging:
    auto_destroy: true
    deployment_branch: develop
  production:
    auto_destroy: false
    deployment_branch: main
    required_reviews: 1
