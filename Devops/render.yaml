services:
  # ─── Express Backend ─────────────────────────────────────────────────────────
  - type: web
    name: bluelearnerhub-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URL
        sync: false   # Set in Render Dashboard — your MongoDB Atlas connection string
      - key: REDIS_URL
        fromService:
          type: redis
          name: bluelearnerhub-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false   # Set after deploying the frontend (e.g. https://bluelearnerhub.vercel.app)
      - key: AI_PROVIDER
        value: local
      - key: AI_SERVICE_URL
        sync: false   # URL of the Python AI worker (optional; features degrade if unset)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: TRUST_PROXY
        value: "true"

  # ─── Redis ───────────────────────────────────────────────────────────────────
  - type: redis
    name: bluelearnerhub-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []   # only reachable from Render services

# ─── Frontend (Next.js) ────────────────────────────────────────────────────────
# The Next.js frontend is best deployed on Vercel (see Frontend/vercel.json).
# To host it on Render instead, add a web service:
#   - type: web
#     name: bluelearnerhub-frontend
#     runtime: node
#     rootDir: Frontend
#     buildCommand: npm install && BUILD_STANDALONE=true npm run build
#     startCommand: node .next/standalone/server.js
#     envVars:
#       - key: NEXT_PUBLIC_API_URL
#         sync: false   # https://bluelearnerhub-backend.onrender.com
#       - key: NEXT_PUBLIC_WS_URL
#         sync: false   # wss://bluelearnerhub-backend.onrender.com
