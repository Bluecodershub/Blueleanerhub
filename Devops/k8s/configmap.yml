apiVersion: v1
kind: ConfigMap
metadata:
  name: bluelearnerhub-config
  namespace: bluelearnerhub
data:
  NODE_ENV: "production"
  PORT: "5000"
  HOST: "0.0.0.0"
  DB_HOST: "mongodb"
  DB_PORT: "27017"
  DB_NAME: "bluelearnerhub"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  JWT_EXPIRES_IN: "7d"
  JWT_REFRESH_EXPIRES_IN: "30d"
  AI_SERVICE_URL: "http://ai-services:8000"
  FRONTEND_URL: "https://bluelearnerhub.com"
  CORS_ORIGINS: "https://bluelearnerhub.com,https://www.bluelearnerhub.com"
  LOG_LEVEL: "info"
