# ═══════════════════════════════════════════════════════════════════════════════
# SECRET TEMPLATE - Populate with actual values before deployment
# Create sealed secret or use external secrets operator for production
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: bluelearnerhub-secrets
  namespace: bluelearnerhub
type: Opaque
stringData:
  # Database & Cache
  MONGODB_URL: "mongodb+srv://USER:PASSWORD@cluster.mongodb.net/bluelearnerhub?retryWrites=true&w=majority"
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION_MIN_32_CHARS"

  # Security - MUST be 32+ characters, cryptographically random
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION_MIN_32_CHARS_LONG_RANDOM"
  JWT_REFRESH_SECRET: "CHANGE_ME_IN_PRODUCTION_MIN_32_CHARS_LONG_RANDOM"
  SESSION_SECRET: "CHANGE_ME_IN_PRODUCTION_MIN_32_CHARS_LONG_RANDOM"
  COOKIE_SECRET: "CHANGE_ME_IN_PRODUCTION_MIN_32_CHARS_LONG_RANDOM"

  # External Services
  GEMINI_API_KEY: "YOUR_GEMINI_API_KEY"
  JUDGE0_API_KEY: "YOUR_JUDGE0_API_KEY"
  JUDGE0_API_URL: "https://judge0-ce.p.rapidapi.com"
  SENDGRID_API_KEY: "YOUR_SENDGRID_API_KEY"

  # Cloud Services
  AWS_ACCESS_KEY_ID: "YOUR_AWS_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "YOUR_AWS_SECRET_KEY"
  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET: "bluelearnerhub-uploads"

  # Payments
  STRIPE_SECRET_KEY: "sk_live_YOUR_STRIPE_SECRET_KEY"
  STRIPE_WEBHOOK_SECRET: "whsec_YOUR_STRIPE_WEBHOOK_SECRET"

  # Monitoring
  SENTRY_DSN: "https://YOUR_SENTRY_DSN"
